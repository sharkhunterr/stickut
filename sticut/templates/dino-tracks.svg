<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:stickut="https://stickut.local/ns"
     viewBox="0 0 210 297" width="210mm" height="297mm">
  <metadata>
    <stickut:meta>
      <stickut:name>Empreintes de dinos</stickut:name>
      <stickut:sticker-area x="15" y="35" width="180" height="247"/>
    </stickut:meta>
  </metadata>

  <text data-stickut="header-text"
        x="105" y="22" text-anchor="middle"
        font-family="Georgia, serif" font-size="11"
        font-weight="700"
        fill="#1f2933">Mes dinos</text>

  <g data-stickut="frame-color" fill="#1f2933">
    <!-- Footprint shape used multiple times -->
    <defs>
      <symbol id="paw" viewBox="0 0 12 16">
        <ellipse cx="6" cy="11" rx="5" ry="4"/>
        <ellipse cx="2" cy="3" rx="1.6" ry="2"/>
        <ellipse cx="6" cy="2" rx="1.6" ry="2"/>
        <ellipse cx="10" cy="3" rx="1.6" ry="2"/>
      </symbol>
    </defs>
    <use href="#paw" x="14" y="6" width="8" height="11"/>
    <use href="#paw" x="40" y="10" width="8" height="11" transform="rotate(15 44 16)"/>
    <use href="#paw" x="80" y="6" width="8" height="11" transform="rotate(-10 84 12)"/>
    <use href="#paw" x="120" y="10" width="8" height="11"/>
    <use href="#paw" x="160" y="6" width="8" height="11" transform="rotate(20 164 12)"/>
    <use href="#paw" x="186" y="10" width="8" height="11"/>

    <use href="#paw" x="14" y="278" width="8" height="11" transform="rotate(180 18 284)"/>
    <use href="#paw" x="60" y="282" width="8" height="11" transform="rotate(180 64 288)"/>
    <use href="#paw" x="120" y="278" width="8" height="11" transform="rotate(180 124 284)"/>
    <use href="#paw" x="180" y="282" width="8" height="11" transform="rotate(180 184 288)"/>
  </g>

  <!-- Ferns: simple stylised fronds -->
  <g data-stickut="frame-color" fill="none" stroke="#1f2933" stroke-width="0.8" stroke-linecap="round">
    <path d="M 8 28 q 4 -8 0 -18"/>
    <path d="M 8 22 q 3 -1 5 -4"/>
    <path d="M 8 16 q 3 -1 5 -4"/>
    <path d="M 202 28 q -4 -8 0 -18"/>
    <path d="M 202 22 q -3 -1 -5 -4"/>
    <path d="M 202 16 q -3 -1 -5 -4"/>
  </g>
</svg>
