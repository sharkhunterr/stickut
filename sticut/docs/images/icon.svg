<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Stickut">
  <title>Stickut</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App background tile -->
  <rect width="256" height="256" rx="56" ry="56" fill="url(#bg)"/>

  <!-- Sticker 1: orange -->
  <g transform="translate(72 76) rotate(-8)" filter="url(#shadow)">
    <rect x="-44" y="-44" width="88" height="88" rx="14" ry="14" fill="#ffffff"/>
    <rect x="-36" y="-36" width="72" height="72" rx="9" ry="9" fill="#f97316"/>
    <!-- star -->
    <path d="M0 -22 L6.5 -7 L22 -5 L10 5 L13 21 L0 13 L-13 21 L-10 5 L-22 -5 L-6.5 -7 Z" fill="#fff"/>
  </g>

  <!-- Sticker 2: green, behind, slightly bigger -->
  <g transform="translate(168 168) rotate(11)" filter="url(#shadow)">
    <rect x="-50" y="-50" width="100" height="100" rx="16" ry="16" fill="#ffffff"/>
    <rect x="-42" y="-42" width="84" height="84" rx="10" ry="10" fill="#10b981"/>
    <!-- heart -->
    <path d="M0 18 C-26 -4 -28 -28 -10 -28 C-2 -28 0 -22 0 -22 C0 -22 2 -28 10 -28 C28 -28 26 -4 0 18 Z" fill="#fff"/>
  </g>

  <!-- Cut path (dashed) — abstract scissors trail -->
  <path d="M30 220 C 60 200, 90 180, 130 195 S 200 230, 230 200" stroke="#fbbf24" stroke-width="3" stroke-dasharray="6 5" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- Tiny scissors top-right -->
  <g transform="translate(206 50) rotate(28) scale(0.95)" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="-8" cy="0" r="5"/>
    <circle cx="8" cy="0" r="5"/>
    <path d="M-3 -2 L26 -16"/>
    <path d="M3 -2 L26 16"/>
  </g>
</svg>
