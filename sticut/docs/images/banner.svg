<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Stickut — sticker sheet generator for Cricut Print Then Cut">
  <title>Stickut</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9f5"/>
      <stop offset="100%" stop-color="#f5e7d6"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Paper sheet (right) — A4-ish portrait but landscape framed -->
  <g transform="translate(720 30)">
    <rect width="540" height="260" rx="12" ry="12" fill="url(#paper)"/>
    <!-- Sticker tiles on the sheet -->
    <g filter="url(#soft)">
      <g transform="translate(80 80) rotate(-7)">
        <rect x="-46" y="-46" width="92" height="92" rx="14" ry="14" fill="#ffffff"/>
        <rect x="-38" y="-38" width="76" height="76" rx="9" ry="9" fill="#f97316"/>
        <path d="M0 -22 L6.5 -7 L22 -5 L10 5 L13 21 L0 13 L-13 21 L-10 5 L-22 -5 L-6.5 -7 Z" fill="#ffffff"/>
      </g>
      <g transform="translate(220 100) rotate(6)">
        <rect x="-48" y="-48" width="96" height="96" rx="14" ry="14" fill="#ffffff"/>
        <rect x="-40" y="-40" width="80" height="80" rx="9" ry="9" fill="#10b981"/>
        <path d="M0 18 C-26 -4 -28 -28 -10 -28 C-2 -28 0 -22 0 -22 C0 -22 2 -28 10 -28 C28 -28 26 -4 0 18 Z" fill="#ffffff"/>
      </g>
      <g transform="translate(370 80) rotate(-3)">
        <rect x="-46" y="-46" width="92" height="92" rx="14" ry="14" fill="#ffffff"/>
        <rect x="-38" y="-38" width="76" height="76" rx="9" ry="9" fill="#a855f7"/>
        <!-- speech bubble shape -->
        <path d="M-22 -10 a14 14 0 0 1 14 -14 h16 a14 14 0 0 1 14 14 v6 a14 14 0 0 1 -14 14 h-12 l-12 12 v-12 a14 14 0 0 1 -6 -2 z" fill="#ffffff"/>
      </g>
      <g transform="translate(140 200) rotate(4)">
        <rect x="-46" y="-46" width="92" height="92" rx="14" ry="14" fill="#ffffff"/>
        <rect x="-38" y="-38" width="76" height="76" rx="9" ry="9" fill="#0ea5e9"/>
        <!-- cat-ear -->
        <path d="M-26 14 C-26 -16 -10 -28 0 -28 C10 -28 26 -16 26 14 C26 24 14 28 0 28 C-14 28 -26 24 -26 14 Z" fill="#ffffff"/>
        <path d="M-22 -22 L-12 -8 L-30 -4 Z M22 -22 L12 -8 L30 -4 Z" fill="#ffffff"/>
      </g>
      <g transform="translate(290 200) rotate(-5)">
        <rect x="-44" y="-44" width="88" height="88" rx="13" ry="13" fill="#ffffff"/>
        <rect x="-36" y="-36" width="72" height="72" rx="9" ry="9" fill="#fbbf24"/>
        <!-- lightning -->
        <path d="M-4 -22 L10 -22 L2 -2 L14 -2 L-6 22 L0 6 L-12 6 Z" fill="#ffffff"/>
      </g>
      <g transform="translate(430 200) rotate(8)">
        <rect x="-44" y="-44" width="88" height="88" rx="13" ry="13" fill="#ffffff"/>
        <rect x="-36" y="-36" width="72" height="72" rx="9" ry="9" fill="#ef4444"/>
        <!-- diamond -->
        <path d="M0 -24 L24 0 L0 24 L-24 0 Z" fill="#ffffff"/>
      </g>
    </g>
    <!-- Cricut "cut path" indication -->
    <path d="M30 240 C150 230 250 250 350 240 S 510 235 510 235" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 4" fill="none"/>
  </g>

  <!-- Wordmark + tagline -->
  <g transform="translate(80 130)">
    <text font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="800" font-size="96" fill="#ffffff" letter-spacing="-3">Stickut</text>
    <text y="62" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="500" font-size="22" fill="#cbd5e1">A4 sticker sheets for Cricut Print Then Cut</text>
    <text y="100" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="400" font-size="16" fill="#fbbf24">Self-hosted · No telemetry · ONNX cutout · Interactive layout</text>
  </g>

  <!-- Decorative scissors -->
  <g transform="translate(620 250) rotate(-15) scale(1.1)" stroke="#fbbf24" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="-10" cy="0" r="6"/>
    <circle cx="10" cy="0" r="6"/>
    <path d="M-4 -3 L34 -22"/>
    <path d="M4 -3 L34 22"/>
  </g>
</svg>
